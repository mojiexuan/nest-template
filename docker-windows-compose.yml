name: chenille

version: '3.8'

services:
  postgres:
    container_name: chenille_postgres
    image: docker.1ms.run/postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: chenille
      POSTGRES_USER: chenille
      POSTGRES_PASSWORD: dE4kL3xT6gI1hT4eQ1cP2iV7iK4jQ6sK
      POSTGRES_INITDB_ARGS: '--encoding=UTF-8 --lc-collate=C --lc-ctype=C'
      TZ: Asia/Shanghai
    ports:
      - '15432:5432'
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/chenille/postgres/db_back:/db_back
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/chenille/postgres/data:/var/lib/postgresql/data
    networks:
      - chenille_network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U chenille -d chenille']
      interval: 10s
      timeout: 5s
      retries: 5

  # pgadmin:
  #   container_name: chenille_pgadmin
  #   image: docker.1ms.run/dpage/pgadmin4:latest
  #   restart: unless-stopped
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: admin@zhidao.com
  #     PGADMIN_DEFAULT_PASSWORD: 123456
  #     PGADMIN_CONFIG_SERVER_MODE: "False"
  #     PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
  #   ports:
  #     - "30002:80"
  #   volumes:
  #     - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/chenille/pgadmin:/var/lib/pgadmin
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   networks:
  #     - chenille_network

  redis:
    container_name: chenille_redis
    restart: unless-stopped
    image: docker.1ms.run/redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - '16379:6379'
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/chenille/redis/data:/data
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/chenille/redis/logs:/var/log/redis
    environment:
      - TZ=Asia/Shanghai
    networks:
      - chenille_network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

networks:
  chenille_network:
    driver: bridge
